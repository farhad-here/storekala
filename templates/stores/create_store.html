{% extends 'base/base.html' %}
{% block title %}Create Store | DijiKala{% endblock %}
{% block content %}

<div class="form-container">
    <h2>🏪 Create New Store</h2>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <div class="form-group">
            <label for="id_name">Store Name</label>
            {{ form.name }}
            {{ form.name.errors }}
        </div>
        <div class="form-group">
            <label for="id_description">Description</label>
            {{ form.description }}
            {{ form.description.errors }}
        </div>

        <button type="submit" class="btn">Create Store</button>
        <a href="{% url 'seller_panel' %}" class="btn-link" style="color: sienna; text-decoration: none; padding: 5px;">Cancel</a>
    </form>
</div>

{% endblock %}
